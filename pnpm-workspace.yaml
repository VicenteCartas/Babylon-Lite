packages:
  - 'packages/*'
  - 'lab'
  - 'playground'

# Company policy: only install dependency versions published at least 7 days
# ago (7 * 24 * 60 = 10080 minutes). Reduces exposure to compromised releases.
# Enforced natively by pnpm >= 10.16 during resolution.
minimumReleaseAge: 10080

# pnpm >= 10 does not run dependency build scripts unless they are explicitly
# approved here. Only these packages ship native binaries that must build.
allowBuilds:
  esbuild: true
  sharp: true

overrides:
  protobufjs: '>=7.6.3'
  fast-uri: '>=3.1.2'
  basic-ftp: '>=5.3.1'
  tmp: '>=0.2.7'
  form-data: '>=4.0.6'
  ip-address: '>=10.1.1'
  uuid@<11.1.1: '>=11.1.1'
  qs: '>=6.15.2'
  js-yaml: '>=4.2.0 <5.0.0'
  brace-expansion: '>=5.0.6'
  picomatch: '>=4.0.4'
  '@protobufjs/utf8': '>=1.1.1'
  dompurify: '>=3.4.11'
